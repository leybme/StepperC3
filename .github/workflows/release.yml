name: Build and Release App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore app/StepperC3.slnx

      - name: Build
        run: dotnet build app/StepperC3.slnx -c Release --no-restore

      - name: Test
        run: dotnet test app/StepperC3.slnx -c Release --no-build --verbosity normal

      - name: Publish (self-contained single file)
        run: >
          dotnet publish app/StepperC3.App
          -c Release
          --self-contained
          -r win-x64
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Create release zip
        run: Compress-Archive -Path publish\StepperC3.App.exe -DestinationPath StepperC3.App-win-x64.zip

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StepperC3.App-win-x64
          path: publish/StepperC3.App.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: StepperC3 App ${{ steps.version.outputs.tag }}
          body: |
            ## StepperC3 Companion App ${{ steps.version.outputs.tag }}

            WPF desktop application for sequencing and executing motor commands against the ESP32-C3 stepper controller chain.

            ### Download

            - **StepperC3.App-win-x64.zip** — Self-contained Windows x64 executable (no .NET runtime required)

            ### Quick start

            1. Extract `StepperC3.App.exe` from the zip
            2. Run `StepperC3.App.exe`
            3. Select your COM port and connect to the motor chain
            4. Add steps, configure, and run

            See [`app/README.md`](app/README.md) for full documentation.
          files: StepperC3.App-win-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true

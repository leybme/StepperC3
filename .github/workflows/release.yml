name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-app:
    name: Build C# App
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore app/StepperC3.slnx

      - name: Build
        run: dotnet build app/StepperC3.slnx -c Release --no-restore

      - name: Test
        run: dotnet test app/StepperC3.slnx -c Release --no-build --verbosity normal

      - name: Publish (self-contained single file)
        run: >
          dotnet publish app/StepperC3.App
          -c Release
          --self-contained
          -r win-x64
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Create release zip
        run: Compress-Archive -Path publish\StepperC3.App.exe -DestinationPath StepperC3.App-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StepperC3.App-win-x64
          path: StepperC3.App-win-x64.zip

  build-firmware:
    name: Build ESP32-C3 Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32-c3-devkitc-02

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: StepperC3-firmware
          path: .pio/build/esp32-c3-devkitc-02/firmware.bin

  release:
    name: Create GitHub Release
    needs: [build-app, build-firmware]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: StepperC3.App-win-x64

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: StepperC3-firmware

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: StepperC3 ${{ steps.version.outputs.tag }}
          body: |
            ## StepperC3 ${{ steps.version.outputs.tag }}

            ### Downloads

            - **StepperC3.App-win-x64.zip** — Self-contained Windows x64 companion app (no .NET runtime required)
            - **firmware.bin** — ESP32-C3 stepper controller firmware

            ### Quick start — Companion App

            1. Extract `StepperC3.App.exe` from the zip
            2. Run `StepperC3.App.exe`
            3. Select your COM port and connect to the motor chain
            4. Add steps, configure, and run

            ### Quick start — Firmware

            1. Connect your ESP32-C3 via USB
            2. Flash using PlatformIO from source: `pio run -t upload`
            3. Or flash the pre-built binary with esptool: `esptool.py --chip esp32c3 write_flash 0x10000 firmware.bin`
               (address 0x10000 is the default app partition offset for the standard partition table)

            See [`app/README.md`](app/README.md) for full documentation.
          files: |
            StepperC3.App-win-x64.zip
            firmware.bin
          draft: false
          prerelease: false
          generate_release_notes: true
